<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原型导航 · Prototypes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme: light;
    --bg:#FBFBFD; --ink:#16181D; --muted:#6B6B7B;
    --accent:#5B4BE8; --accent-dark:#4536C4; --accent-soft:#EEEBFF;
    --live:#12A150; --live-soft:#E4F5EC; --warn:#B4690E; --warn-soft:#FBF1E1;
    --surface:#FFFFFF; --border:#E7E7EE; --border-strong:#D4D4DE;
    --display:"Space Grotesk","PingFang SC","Microsoft YaHei",sans-serif;
    --body:"Inter","PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
    --mono:"JetBrains Mono","SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:820px;margin:0 auto;padding:0 24px}

  header{
    padding:64px 0 34px;
    background:radial-gradient(1000px 360px at 85% -20%, var(--accent-soft), transparent 60%);
    border-bottom:1px solid var(--border);
  }
  .kicker{
    font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent-dark);display:inline-flex;align-items:center;gap:8px;
    padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:999px;margin-bottom:20px;
  }
  .kicker .dot{width:7px;height:7px;border-radius:50%;background:var(--live);box-shadow:0 0 0 4px var(--live-soft)}
  h1{font-family:var(--display);font-weight:700;font-size:clamp(28px,4.5vw,42px);letter-spacing:-0.02em;line-height:1.1;margin-bottom:14px}
  .lede{color:var(--muted);font-size:16.5px;max-width:600px}

  .baseurl{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:24px;
    background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px 14px;
  }
  .baseurl .tag{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .baseurl .val{font-family:var(--mono);font-size:13px;color:var(--accent-dark);flex:1;min-width:180px;word-break:break-all}
  .baseurl.warn .val{color:var(--warn)}
  .refresh{
    background:none;border:1px solid var(--border-strong);border-radius:8px;cursor:pointer;
    color:var(--muted);font-family:var(--body);font-size:12.5px;padding:5px 11px;display:inline-flex;align-items:center;gap:6px;
  }
  .refresh:hover{background:#F5F5F8;color:var(--ink)}

  main{padding:34px 0 20px;min-height:180px}
  .count{font-family:var(--mono);font-size:12.5px;color:var(--muted);letter-spacing:.04em;margin-bottom:18px}

  .card{
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:18px 20px;margin-bottom:14px;transition:border-color .15s,box-shadow .15s,transform .15s;
  }
  .card:hover{border-color:var(--border-strong);box-shadow:0 8px 26px -18px rgba(22,24,29,.35);transform:translateY(-1px)}
  .card .idx{
    font-family:var(--display);font-weight:600;font-size:14px;color:var(--accent);
    width:30px;height:30px;flex-shrink:0;border-radius:8px;background:var(--accent-soft);
    display:flex;align-items:center;justify-content:center;
  }
  .card .meta{flex:1;min-width:180px}
  .card .name{font-family:var(--display);font-weight:600;font-size:16.5px;margin-bottom:3px;line-height:1.3}
  .card .file{font-family:var(--mono);font-size:12.5px;color:var(--muted)}
  .card .actions{display:flex;gap:8px;flex-shrink:0}

  .btn{
    display:inline-flex;align-items:center;gap:7px;font-family:var(--body);font-weight:600;font-size:13.5px;
    border-radius:9px;padding:8px 14px;cursor:pointer;border:1px solid var(--border-strong);
    background:#fff;color:var(--ink);text-decoration:none;transition:background .15s,border-color .15s,color .15s;white-space:nowrap;
  }
  .btn:hover{background:#F5F5F8}
  .btn.open{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.open:hover{background:var(--accent-dark)}
  .btn.copied{background:var(--live);color:#fff;border-color:var(--live)}
  .btn svg{width:15px;height:15px;flex-shrink:0}

  .state{
    text-align:center;padding:46px 20px;color:var(--muted);font-size:15px;
    border:1px dashed var(--border-strong);border-radius:14px;background:var(--surface);
  }
  .state .big{font-size:30px;display:block;margin-bottom:12px}
  .state.err{border-color:#EAD4A8;background:var(--warn-soft);color:#6B4A14}
  .state code{font-family:var(--mono);font-size:12.5px;background:#fff;border:1px solid var(--border);padding:1px 6px;border-radius:5px}
  .spinner{width:26px;height:26px;border:3px solid var(--accent-soft);border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  footer{padding:30px 0 60px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px}

  .toast{
    position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:14px;padding:11px 20px;border-radius:10px;
    box-shadow:0 12px 30px -10px rgba(0,0,0,.4);opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;font-family:var(--body);z-index:50;max-width:88vw;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .u{font-family:var(--mono);font-size:12px;color:#B9B3F5;display:block;margin-top:3px;word-break:break-all}

  @media (max-width:560px){
    .card{align-items:flex-start}
    .card .actions{width:100%}
    .btn{flex:1;justify-content:center}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}.spinner{animation:none}}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <span class="kicker"><span class="dot"></span>Prototypes · 原型导航</span>
    <h1>交互原型索引</h1>
    <p class="lede">本页会自动读取 GitHub 仓库里的所有原型,无需手动登记——新文件传上去,刷新即可见。点「复制链接」一键拿到完整可分享网址。</p>

    <div class="baseurl" id="baseBox">
      <span class="tag">当前站点</span>
      <span class="val" id="baseUrl">读取中…</span>
      <button class="refresh" id="refreshBtn" title="重新读取仓库">↻ 刷新</button>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <p class="count" id="count"></p>
    <div id="list"></div>
  </div>
</main>

<footer>动态读取自 GitHub · 完整 URL 由当前地址自动生成</footer>

<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   动态原型导航页
   - 从当前 GitHub Pages 地址自动推断 owner / repo / 目录
   - 用 GitHub 公开 API 列出仓库内所有 .html(index.html 除外)
   - 完整 URL 由当前页面地址拼接,复制即分享
   可选:若自动推断失败,可在下面手动填写 owner / repo
===================================================================== */
const MANUAL = { owner: "", repo: "", branch: "" };  // 一般留空即可

const baseHref = new URL(".", location.href).href;   // 当前目录绝对地址
const host = location.hostname;                       // xxx.github.io
const parts = location.pathname.split("/").filter(Boolean);

let owner = MANUAL.owner, repo = MANUAL.repo, dir = "";
const branch = MANUAL.branch || "";                   // 空 = 用仓库默认分支
const isPages = /\.github\.io$/i.test(host);

if (!owner && isPages) {
  owner = host.replace(/\.github\.io$/i, "");
  if (parts.length === 0) {
    // 用户主页仓库 owner.github.io,内容在该仓库根目录
    repo = owner + ".github.io";
    dir = "";
  } else {
    // 项目仓库 owner.github.io/repo/...
    repo = parts[0];
    dir = parts.slice(1).join("/");     // index.html 所在子目录(通常为空)
  }
}

const baseBox = document.getElementById("baseBox");
const baseUrlEl = document.getElementById("baseUrl");
const listEl = document.getElementById("list");
const countEl = document.getElementById("count");
document.getElementById("refreshBtn").addEventListener("click", load);

const copyIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
const openIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';

function setState(html, cls) {
  listEl.innerHTML = '<div class="state ' + (cls || "") + '">' + html + '</div>';
}

// 顶部地址栏
if (location.protocol === "file:") {
  baseBox.classList.add("warn");
  baseUrlEl.textContent = "本地预览(file://)——动态读取仅在 GitHub Pages 上生效";
} else {
  baseUrlEl.textContent = baseHref;
}

async function load() {
  if (location.protocol === "file:") {
    setState('<span class="big">🖥️</span>当前是本地预览,无法读取 GitHub。<br>把本文件传到 GitHub Pages 打开后,会自动列出所有原型。');
    countEl.textContent = "";
    return;
  }
  if (!owner || !repo) {
    setState('<span class="big">⚙️</span>无法自动识别仓库。<br>请在源码顶部的 <code>MANUAL</code> 里手动填写 owner 和 repo。', "err");
    return;
  }

  setState('<div class="spinner"></div>正在读取 GitHub 仓库…');
  countEl.textContent = "";

  const api = "https://api.github.com/repos/" + owner + "/" + repo +
              "/contents/" + (dir ? encodeURI(dir) : "") + (branch ? "?ref=" + branch : "");
  let items;
  try {
    const res = await fetch(api, { headers: { "Accept": "application/vnd.github+json" } });
    if (res.status === 403) throw new Error("rate");
    if (!res.ok) throw new Error("http " + res.status);
    items = await res.json();
  } catch (e) {
    const msg = e.message === "rate"
      ? "GitHub API 访问频率超限了,请过几分钟再刷新。"
      : "读取失败(" + e.message + ")。请确认仓库是公开的,且已开启 Pages。";
    setState('<span class="big">⚠️</span>' + msg, "err");
    return;
  }

  if (!Array.isArray(items)) {
    setState('<span class="big">⚠️</span>返回数据异常,请确认仓库名和路径正确。', "err");
    return;
  }

  const htmls = items.filter(f =>
    f.type === "file" &&
    /\.html?$/i.test(f.name) &&
    f.name.toLowerCase() !== "index.html"
  ).sort((a, b) => a.name.localeCompare(b.name));

  if (htmls.length === 0) {
    setState('<span class="big">📭</span>仓库里还没有原型文件。<br>上传一个 .html 后回来刷新即可。');
    countEl.textContent = "";
    return;
  }

  countEl.textContent = htmls.length + " 个原型 · 读取自 GitHub";
  listEl.innerHTML = "";

  htmls.forEach((f, i) => {
    const fullUrl = new URL(f.name, baseHref).href;
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      '<div class="idx">' + String(i + 1).padStart(2, "0") + '</div>' +
      '<div class="meta">' +
        '<div class="name" data-name="' + f.name + '">' + f.name.replace(/\.html?$/i, "") + '</div>' +
        '<div class="file">' + f.name + '</div>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn copy">' + copyIcon + '<span>复制链接</span></button>' +
        '<a class="btn open" href="' + encodeURI(f.name) + '" target="_blank" rel="noopener">' + openIcon + '<span>打开</span></a>' +
      '</div>';
    card.querySelector(".copy").addEventListener("click", ev => copyUrl(fullUrl, ev.currentTarget));
    listEl.appendChild(card);
    fetchTitle(fullUrl, card.querySelector(".name"));
  });
}

// 尝试从原型文件本身读取 <title> 作为显示名(走 Pages,不占 API 配额)
async function fetchTitle(url, el) {
  try {
    const res = await fetch(url, { headers: { "Range": "bytes=0-2048" } });
    if (!res.ok) return;
    const text = await res.text();
    const m = text.match(/<title>([^<]*)<\/title>/i);
    if (m && m[1].trim()) el.textContent = m[1].trim();
  } catch (e) { /* 保持文件名即可 */ }
}

const toast = document.getElementById("toast");
let toastTimer;
function showToast(url) {
  toast.innerHTML = "链接已复制 ✓<span class='u'>" + url + "</span>";
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 2600);
}

function copyUrl(url, btn) {
  const done = () => {
    const label = btn.querySelector("span");
    const old = label.textContent;
    btn.classList.add("copied");
    label.textContent = "已复制";
    showToast(url);
    setTimeout(() => { btn.classList.remove("copied"); label.textContent = old; }, 1800);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(url).then(done).catch(() => fallbackCopy(url, done));
  } else {
    fallbackCopy(url, done);
  }
}
function fallbackCopy(text, done) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); done(); }
  catch (e) { prompt("请手动复制链接:", text); }
  document.body.removeChild(ta);
}

load();
</script>
</body>
</html>
